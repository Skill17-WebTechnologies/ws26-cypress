services:
  web:
    image: nginx:alpine
    volumes:
      - ./public:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 3s
      timeout: 3s
      retries: 20
  cypress:
    image: cypress/included:15.10.0
    depends_on:
      web:
        condition: service_healthy
    working_dir: /e2e
    environment:
      CYPRESS_baseUrl: http://web
    volumes:
      - .:/e2e
